services:
  web:
    image: nginx:alpine
    restart: unless-stopped
    volumes:
      - ${HOME_DIR}/web:/var/www/html
      - ${HOME_DIR}/logs:/var/log/nginx
    configs:
      - source: nginx_config
        target: /etc/nginx/conf.d/default.conf
    networks:
      - proxy
    depends_on: 
      - wordpress
      
  db:
    image: mysql:lts
    volumes:
      - ${HOME_DIR}/db:/var/lib/mysql
    restart: unless-stopped
    command: --innodb-buffer-pool-size=512M --innodb-redo-log-capacity=128M
    environment:
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD}
      MYSQL_DATABASE: wordpress
      MYSQL_USER: ${MYSQL_APP_USER}
      MYSQL_PASSWORD: ${MYSQL_APP_PASSWORD}
    networks:
      - local
 
 # redis:
 #   image: redis:alpine
 #   restart: always
 #   volumes:
 #     /srv/docker/wp-maker/redis:/data
 # networks:
 #   - local

  wordpress:
    build:
      context: .
      dockerfile_inline: |
        FROM wordpress:php8.5-fpm
        RUN apt-get update && apt-get install -y --no-install-recommends \
            libzip-dev zip unzip libpng-dev libjpeg-dev libwebp-dev libfreetype6-dev libxml2-dev libicu-dev \
            && rm -rf /var/lib/apt/lists/*
        RUN docker-php-ext-configure gd --with-freetype --with-jpeg --with-webp \
            && docker-php-ext-configure intl
        RUN docker-php-ext-install gd zip intl
        RUN echo "[www]\npm = dynamic\npm.max_children = 50\npm.start_servers = 10\npm.min_spare_servers = 5\npm.max_spare_servers = 20\npm.max_requests = 500" > /usr/local/etc/php-fpm.d/zz-tuning.conf
        RUN chown -R www-data:www-data /var/www/html
    restart: unless-stopped
    volumes:
      - ${HOME_DIR}/web:/var/www/html
    configs:
      - source: php_uploads
        target: /usr/local/etc/php/conf.d/uploads.ini
      - source: php_opcache
        target: /usr/local/etc/php/conf.d/opcache.ini
    environment:
      WORDPRESS_DB_HOST: db:3306
      WORDPRESS_DB_USER: ${MYSQL_APP_USER}
      WORDPRESS_DB_PASSWORD: ${MYSQL_APP_PASSWORD}
      # WP_REDIS_HOST: redis
      # WP_REDIS_PORT: 6379
    networks:
      - local
      - proxy
    depends_on: 
      - db

networks:
  local:
    driver: bridge
  proxy:
    external: true

configs:
  nginx_config:
    content: |
      server {
          listen 80;
          server_name localhost;
          root /var/www/html;
          index index.php;
          
          access_log /var/log/nginx/access.log;
          error_log /var/log/nginx/error.log;
          
          gzip on;
          gzip_types text/plain text/css application/json application/javascript text/xml application/xml application/xml+rss text/javascript;

          proxy_redirect off;
          absolute_redirect on;
          client_max_body_size 684M;
          client_header_buffer_size 64k;
          large_client_header_buffers 4 64k;
          proxy_buffer_size 128k;
          proxy_buffers 4 256k;
          proxy_busy_buffers_size 256k;

          location / {
              try_files $$uri $$uri/ /index.php$$is_args$$args;
          }

          location ~ \.php$$ {
              try_files $$uri = 404;
              include fastcgi_params;
              fastcgi_buffers 16 16k;
              fastcgi_buffer_size 32k;
              fastcgi_pass wordpress:9000;
              fastcgi_index index.php;
              fastcgi_split_path_info       ^(.+\.php)(/.+)$$;
              fastcgi_param SCRIPT_FILENAME $$document_root$$fastcgi_script_name;
              fastcgi_param PATH_INFO       $$fastcgi_path_info;
          }

          location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg|woff|woff2|ttf|otf)$$ {
              expires max;
              log_not_found off;
              access_log off;
          }
      }

  php_uploads:
    content: |
      memory_limit = 256M
      upload_max_filesize = 512M
      post_max_filesize = 512M
      max_execution_time = 300

  php_opcache:
    content: |
      opcache.enable=1
      opcache.memory_consumption=256
      opcache.interned_strings_buffer=16
      opcache.max_accelerated_files=20000
      opcache.revalidate_freq=2
      opcache.validate_timestamps=1
      opcache.fast_shutdown=1
